# SSV market-quality monitoring configuration.
# All values can be overridden by environment variables (see config.py / .env.example).

sampling:
  # How often (seconds) a metric sample is taken from each live order book.
  # 5s => 17280 expected samples per UTC day per market.
  cadence_seconds: 5
  # Books with no update for longer than this are dropped and counted as a
  # coverage gap instead of being re-sampled (silently stalled feed guard).
  max_book_age_seconds: 60

depth:
  # How many price levels to request per side via watchOrderBook.
  # SSV bands are narrow, so deep-enough L2 (not full L3) reliably covers +/-2%.
  book_limit: 50
  # Depth bands in basis points of mid. 100 bps = +/-1%, 200 bps = +/-2%.
  bands_bps: [100, 200]

coverage:
  # Daily aggregates with coverage below this percentage are flagged low_coverage
  # and excluded from trend/comparison panels by default.
  threshold_pct: 90

aggregator:
  # UTC hour at which the scheduled daily job runs (computes the previous UTC day).
  run_hour_utc: 0
  run_minute_utc: 30

# Markets to monitor. Symbols use CCXT unified notation (BASE/QUOTE).
# USDT/USDC are treated as ~= USD for depth notional. A non-USD (fiat) quote like EUR
# must have a matching `fx:` entry below so its depth is converted to USD.
# Markets not listed on a venue are skipped + logged at startup (delisting-safe).
markets:
  - { exchange: binance, symbol: "SSV/USDT" }
  - { exchange: binance, symbol: "SSV/USDC" }
  - { exchange: bybit,   symbol: "SSV/USDT" }
  - { exchange: bybit,   symbol: "SSV/USDC" }
  - { exchange: gate,    symbol: "SSV/USDT" }
  - { exchange: gate,    symbol: "SSV/USDC" }
  - { exchange: kucoin,  symbol: "SSV/USDT" }
  - { exchange: kucoin,  symbol: "SSV/USDC" }
  - { exchange: okx,     symbol: "SSV/USDT" }
  - { exchange: okx,     symbol: "SSV/USDC" }
  - { exchange: bitvavo, symbol: "SSV/EUR" }

# FX conversion sources, keyed by the fiat quote currency. Each non-USD-quoted market
# above must have an entry here. The collector watches the cross book like any other
# market; the sampler reads its mid as the quote->USD rate (a stale/missing cross makes
# the dependent sample a coverage gap, never fabricated). `invert: true` when the cross is
# quoted stablecoin/fiat: bitvavo lists USDC/EUR (mid = EUR per USD), so USD per EUR = 1/mid.
fx:
  EUR: { exchange: bitvavo, symbol: "USDC/EUR", invert: true }

# Per-(exchange, symbol) benchmark targets the collected metrics are compared against.
# Synced into the benchmark_targets table on startup (and via `--seed-benchmarks`); the
# benchmark_comparison view + Grafana panels show target vs. actual and over/under status.
# Each metric target is optional. max_spread_pct is a ceiling in percent (lower = better,
# matching avg_spread_pct); min_depth_*_usd are floors in USD (higher = better). Every row
# must reference a market listed above. Values below are illustrative — tune per venue.
benchmarks:
  - { exchange: binance, symbol: "SSV/USDT", max_spread_pct: 0.10, min_depth_100_usd: 80000, min_depth_200_usd: 160000 }
  - { exchange: binance, symbol: "SSV/USDC", max_spread_pct: 0.10, min_depth_100_usd: 80000, min_depth_200_usd: 160000 }
  - { exchange: okx, symbol: "SSV/USDT", max_spread_pct: 0.10, min_depth_100_usd: 80000, min_depth_200_usd: 160000 }
  - { exchange: okx, symbol: "SSV/USDC", max_spread_pct: 0.10, min_depth_100_usd: 80000, min_depth_200_usd: 160000 }
  - { exchange: bybit,   symbol: "SSV/USDT", max_spread_pct: 0.15, min_depth_100_usd: 60000, min_depth_200_usd: 120000 }
  - { exchange: gate,   symbol: "SSV/USDT", max_spread_pct: 0.20, min_depth_100_usd: 40000, min_depth_200_usd: 90000 }
  - { exchange: kucoin,   symbol: "SSV/USDT", max_spread_pct: 0.20, min_depth_100_usd: 40000, min_depth_200_usd: 90000 }
  - { exchange: bitvavo,  symbol: "SSV/EUR",  max_spread_pct: 0.20, min_depth_100_usd: 40000, min_depth_200_usd: 90000 }

# Daily reference-price collection for the correlation/beta KPIs (separate from the
# order-book monitoring above). The aggregator pulls one daily UTC close per asset via CCXT
# 1d candles, then computes each non-benchmark asset's rolling correlation and beta vs the
# benchmark_asset. SSV is a beta play on ETH, so ETH is the benchmark; RPL is the first
# staking-narrative comparison. Adding another comparison project is a single `assets:` line.
# Backfill history on demand: `aggregator --backfill` (loads `backfill_days` of closes).
prices:
  enabled: true
  benchmark_asset: ETH
  windows: [30, 60, 90]      # rolling lookbacks in days
  min_obs_ratio: 0.9         # fraction of a window required before publishing corr/beta
  backfill_days: 120         # daily closes loaded by `--backfill`
  assets:
    - { asset: SSV, exchange: binance, symbol: "SSV/USDT" }
    - { asset: ETH, exchange: binance, symbol: "ETH/USDT" }
    - { asset: RPL, exchange: binance, symbol: "RPL/USDT" }