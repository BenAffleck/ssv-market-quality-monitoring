apiVersion: 1

datasources:
  - name: SSV-TimescaleDB
    uid: ssv_tsdb
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: ${PG_USER}
    # Top-level `database` is kept for older Grafana; v11+ reads it from jsonData.database.
    database: ${PG_DB}
    secureJsonData:
      password: ${PG_PASSWORD}
    jsonData:
      database: ${PG_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
